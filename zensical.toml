[project.theme]
variant = "modern"
language = "zh"
logo = "assert/logo.gif"
favicon = "assert/logo.gif"
custom_dir = "overrides"
icon.repo = "fontawesome/brands/github"
features = [
    # 当启用即时导航时，所有内部链接的点击操作都会被拦截，并通过XHR分发请求，而不会完全重新加载页面。
    "navigation.instant",
    # 当用户将鼠标悬停在链接上时就会开始获取页面内容。这会降低用户感知的加载时间，特别是在慢速网络环境下，因为导航后页面将会立即可用。
    "navigation.instant.prefetch",
    # 进度指示器。它会显示在页面顶部，等页面完全加载后再隐藏。
    "navigation.instant.progress",
    # 顶层板块会在视口宽度大于1220px时以菜单的形式显示在页眉下方，而在移动端则保持原样。
    "navigation.tabs",
    # 文档面包屑
    "navigation.path",
    # 当启用裁剪功能时，只有可见的导航项会被渲染到 HTML 中，从而使构建后的网站体积减少 33% 或更多。
    "navigation.prune",
    # 启用章节索引页后，可以将文档直接附加到各个章节，这对于提供概览页面尤其有用。
    "navigation.indexes",
    # 当启用目录的锚点跟随功能时，侧边栏会自动滚动，确保当前激活的锚点始终可见。
    "toc.follow",
    # 返回顶部按钮
    "navigation.top",
    # 跳转到目标页后，搜索关键词高亮
    "search.highlight",
    # 页脚可以包含当前页面的上一页和下一页链接。
    "navigation.footer",
    # 自动更新地址栏中的 URL 锚点，方便分享带锚点的页面链接。
    "navigation.tracking",
    # 编辑页面按钮
    "content.action.edit",
    # 查看页面代码按钮
    "content.action.view",
    "content.code.copy",
    "content.code.select",
    "content.code.annotate",
    "content.tooltips"
]

[project.extra]
generator = false

# 社交链接
[[project.extra.social]]
icon = "fontawesome/brands/github"
