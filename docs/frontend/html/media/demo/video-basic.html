<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>video 基本用法</title>
</head>
<body>
<!-- video 标签基本用法：最简写法与常用属性组合 -->
<!-- 最简写法 -->
<video src="video/intro.mp4" controls></video>

<!-- 常用属性组合 -->
<video
  src="video/intro.mp4"
  controls
  width="640"
  height="360"
  poster="images/video-cover.jpg"
>
  您的浏览器不支持 video 标签。
</video>
</body>
</html>
