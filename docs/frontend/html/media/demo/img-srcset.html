<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>img 标签的 srcset 简写</title>
</head>
<body>
<!-- img 标签的 srcset 属性：根据设备 DPI 加载不同分辨率的图片 -->
<!-- 普通屏幕加载 1 倍图，高清屏幕加载 2 倍图 -->
<img
  src="images/logo.webp"
  srcset="images/logo.webp 1x, images/logo@2x.webp 2x"
  alt="公司 Logo"
>
</body>
</html>
