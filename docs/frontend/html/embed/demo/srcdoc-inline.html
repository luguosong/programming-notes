<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>srcdoc 内联示例</title>
    <style>
        body { margin: 0; font-family: sans-serif; padding: 1rem; }
    </style>
</head>
<body>
    <iframe
      srcdoc="<h1>Hello!</h1><p>这段内容直接写在属性中。</p>"
      width="300"
      height="150"
      title="内联内容">
    </iframe>
</body>
</html>
