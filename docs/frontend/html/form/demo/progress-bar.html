<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>progress 进度条</title>
</head>
<body>
<!-- progress 进度条：确定性（已知百分比）和不确定性（加载中） -->
<!-- 确定性进度（已知百分比） -->
<label>上传进度：<progress value="70" max="100">70%</progress></label>

<br><br>
<!-- 不确定性进度（加载中，不知道多久） -->
<label>加载中：<progress>请稍候...</progress></label>
</body>
</html>
