<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>textarea 的默认值</title>
</head>
<body>
<!-- textarea 的默认值：内容写在标签之间，而非 value 属性 -->
<textarea name="bio">这里写默认内容</textarea>
<br><br>
<!-- 错误：textarea 没有 value 属性 -->
<textarea name="bio" value="默认值"></textarea>
</body>
</html>
