<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>datalist 输入建议</title>
</head>
<body>
<!-- datalist 输入建议：配合 input 提供可选建议列表 -->
<input type="text" name="browser" list="browser-list" placeholder="输入或选择浏览器">
<datalist id="browser-list">
  <option value="Chrome">
  <option value="Firefox">
  <option value="Safari">
  <option value="Edge">
</datalist>
</body>
</html>
