<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录用 POST</title>
</head>
<body>
<!-- 登录用 POST：数据放在请求体中，适合有数据修改的操作 -->
<form action="/login" method="POST">
  <input type="text" name="username" placeholder="用户名">
  <input type="password" name="password" placeholder="密码">
  <button type="submit">登录</button>
</form>
</body>
</html>
