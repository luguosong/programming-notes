<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>button vs input 按钮</title>
</head>
<body>
<!-- button vs input 按钮：button 支持图标和富文本，input 只能纯文本 -->
<!-- button 可以放图标、文字 -->
<button type="submit">
  发送
</button>

<!-- input 按钮只能放纯文本 -->
<input type="submit" value="发送">
</body>
</html>
