<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>fieldset 禁用整组控件</title>
</head>
<body>
<!-- fieldset 禁用整组控件：disabled 属性让组内所有控件不可编辑 -->
<fieldset disabled>
  <legend>高级设置（当前不可编辑）</legend>
  <input type="text" name="api_key" placeholder="API Key">
  <input type="text" name="webhook" placeholder="Webhook URL">
</fieldset>
</body>
</html>
