<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>wbr 与 data 演示</title>
</head>
<body>
<!-- wbr 与 data 演示 -->
<!-- wbr：在超长单词/URL 中建议换行位置 -->
<p>访问 https://this<wbr>is<wbr>a<wbr>very<wbr>long<wbr>url.com 查看详情。</p>

<!-- data：value 属性提供机器可读的值 -->
<p>商品价格：<data value="299">299.00 元</data></p>
</body>
</html>
