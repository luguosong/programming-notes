<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>引用演示</title>
</head>
<body>
<!-- 引用演示 -->
<!-- 块级引用：独占一块区域，适合引用较长的内容 -->
<blockquote cite="https://www.w3.org/TR/html52/">
  <p>HTML 是万维网的核心语言。</p>
</blockquote>

<!-- 行内引用：嵌入在句子中，浏览器自动加引号 -->
<p>万维网联盟表示，<q>HTML 是万维网的核心语言。</q></p>
</body>
</html>
