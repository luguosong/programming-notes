<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>标题标签演示</title>
</head>
<body>
<!-- 标题标签演示 -->
<!-- 页面中唯一的大标题 -->
<h1>HTML 学习笔记</h1>

<!-- 章节标题 -->
<h2>文本内容</h2>

<!-- 小节标题 -->
<h3>标题与段落</h3>

<!-- 更细的层级（实际开发中较少使用到 h5、h6） -->
<h4>补充说明</h4>
<h5>脚注</h5>
<h6>附录</h6>
</body>
</html>
