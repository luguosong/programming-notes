<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>一对多和多对一的描述列表</title>
</head>
<body>
<!-- 一对多和多对一的描述列表 -->
<dl>
  <!-- 一个术语，多个描述 -->
  <dt>cookie</dt>
  <dd>一种小型文本文件，由服务器发送并存储在浏览器中。</dd>
  <dd>也指一种 Unix 中的网络请求工具。</dd>

  <!-- 多个术语，一个描述 -->
  <dt>JavaScript</dt>
  <dt>JS</dt>
  <dd>一种动态脚本语言，广泛用于 Web 前端开发。</dd>
</dl>
</body>
</html>
