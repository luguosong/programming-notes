<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>正确的嵌套写法</title>
</head>
<body>
<!-- 正确的嵌套写法：内层列表放在 li 内部 -->
<ul>
  <li>前端
    <ul>
      <li>HTML</li>
      <li>CSS</li>
      <li>JavaScript</li>
    </ul>
  </li>
  <li>后端
    <ul>
      <li>Java</li>
      <li>Python</li>
      <li>Go</li>
    </ul>
  </li>
</ul>
</body>
</html>
