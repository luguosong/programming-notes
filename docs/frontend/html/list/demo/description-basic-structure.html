<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>描述列表基本结构</title>
</head>
<body>
<!-- 描述列表基本结构：dl 容器 + dt 术语 + dd 描述 -->
<dl>
  <dt>HTML</dt>
  <dd>超文本标记语言，用于定义网页的结构和内容。</dd>

  <dt>CSS</dt>
  <dd>层叠样式表，用于控制网页的视觉表现。</dd>

  <dt>JavaScript</dt>
  <dd>脚本语言，用于实现网页的交互行为。</dd>
</dl>
</body>
</html>
