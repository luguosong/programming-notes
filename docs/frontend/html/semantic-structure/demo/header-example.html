<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>header 示例</title>
</head>
<body>
<!-- header 示例：展示页面级页眉和文章内页眉 -->
<!-- 页面级页眉 -->
<header>
  <h1>我的技术博客</h1>
  <p>记录前端学习之路</p>
</header>

<!-- 文章内页眉 -->
<article>
  <header>
    <h2>HTML 语义化入门</h2>
    <p>发布于 2025-01-01</p>
  </header>
  <p>正文内容...</p>
</article>
</body>
</html>
