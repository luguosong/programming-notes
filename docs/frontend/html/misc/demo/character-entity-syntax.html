<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>字符实体语法演示</title>
</head>
<body>
<!-- 字符实体语法演示 -->
<!-- 使用实体名称 -->
&lt;    <!-- 显示为 < -->
&amp;   <!-- 显示为 & -->

<!-- 使用实体编号（十进制） -->
&lt;    <!-- 等价于 &#60; -->

<!-- 使用实体编号（十六进制） -->
&lt;    <!-- 等价于 &#x3C; -->
</body>
</html>
