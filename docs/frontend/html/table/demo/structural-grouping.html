<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>结构分组的完整表格</title>
</head>
<body>
<!-- 结构分组的完整表格：thead / tbody / tfoot 语义分组演示 -->
<table>
  <caption>2025 年 Q1 季度销售数据</caption>

  <!-- 表头区域 -->
  <thead>
    <tr>
      <th>产品</th>
      <th>一月</th>
      <th>二月</th>
      <th>三月</th>
    </tr>
  </thead>

  <!-- 表体区域 -->
  <tbody>
    <tr>
      <td>笔记本电脑</td>
      <td>1,200</td>
      <td>980</td>
      <td>1,350</td>
    </tr>
    <tr>
      <td>智能手机</td>
      <td>2,500</td>
      <td>2,100</td>
      <td>2,800</td>
    </tr>
    <tr>
      <td>平板电脑</td>
      <td>600</td>
      <td>550</td>
      <td>720</td>
    </tr>
  </tbody>

  <!-- 表尾区域 -->
  <tfoot>
    <tr>
      <th>合计</th>
      <td>4,300</td>
      <td>3,630</td>
      <td>4,870</td>
    </tr>
  </tfoot>
</table>
</body>
</html>
