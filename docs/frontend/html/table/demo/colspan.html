<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>colspan 跨列合并</title>
</head>
<body>
<!-- colspan 跨列合并：表头分组演示 -->
<table>
  <caption>学生成绩表</caption>
  <thead>
    <tr>
      <th rowspan="2">姓名</th>
      <th colspan="2">期中考试</th>
      <th colspan="2">期末考试</th>
    </tr>
    <tr>
      <th>语文</th>
      <th>数学</th>
      <th>语文</th>
      <th>数学</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>张三</td>
      <td>85</td>
      <td>92</td>
      <td>88</td>
      <td>95</td>
    </tr>
  </tbody>
</table>
</body>
</html>
