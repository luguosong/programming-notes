<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>基本表格结构</title>
    <style>
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background: #f5f5f5; }
    </style>
</head>
<body>
<!-- 基本表格结构：table / caption / tr / th / td 标签演示 -->
<table>
  <caption>前端框架对比</caption>
  <tr>
    <th>框架</th>
    <th>发布年份</th>
    <th>开发者</th>
  </tr>
  <tr>
    <td>React</td>
    <td>2013</td>
    <td>Meta</td>
  </tr>
  <tr>
    <td>Vue</td>
    <td>2014</td>
    <td>尤雨溪</td>
  </tr>
  <tr>
    <td>Angular</td>
    <td>2016</td>
    <td>Google</td>
  </tr>
</table>
</body>
</html>
