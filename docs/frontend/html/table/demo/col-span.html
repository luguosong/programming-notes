<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>col 的 span 属性</title>
    <style>
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background: #f5f5f5; }
    </style>
</head>
<body>
<!-- col 的 span 属性：一次定义多列样式 -->
<table>
  <caption>col span 示例</caption>
  <colgroup>
    <col style="width: 80px">         <!-- 第 1 列 -->
    <col span="2" style="background: #f5f5f5">  <!-- 第 2、3 列 -->
    <col style="text-align: right">   <!-- 第 4 列 -->
  </colgroup>
  <thead>
    <tr>
      <th>工号</th>
      <th>姓名</th>
      <th>部门</th>
      <th>薪资</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>001</td>
      <td>张三</td>
      <td>技术部</td>
      <td>15,000</td>
    </tr>
  </tbody>
</table>
</body>
</html>
